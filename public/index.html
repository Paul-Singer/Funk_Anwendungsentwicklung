<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>GHCN Klimadatenportal</title>
    <link rel="stylesheet" href="styles.css?v=20260303c" />
  </head>
  <body class="dark">
    <div class="app">
      <header class="header">
        <h1>GHCN Data View</h1>
        <label class="switch">
          <span class="switch-label">Dark Mode</span>
          <input id="themeToggle" type="checkbox" role="switch" />
          <span class="switch-track"></span>
        </label>
      </header>

      <main class="layout">
        <div class="top-row">
          <section class="card search-card">
            <h2>Suche</h2>
            <form id="searchForm" novalidate>
              <div class="inputs">
                <div class="field">
                  <label for="latitude">Breitengrad</label>
                  <input id="latitude" name="latitude" type="number" min="-90" max="90" step="0.01" required />
                  <div class="error" id="error-latitude"></div>
                </div>

                <div class="field">
                  <label for="longitude">Längengrad</label>
                  <input id="longitude" name="longitude" type="number" min="-180" max="180" step="0.01" required />
                  <div class="error" id="error-longitude"></div>
                </div>

                <div class="field">
                  <label for="radius">Radius in Kilometer</label>
                  <input id="radius" name="radius" type="number" min="0" max="100" step="1" required />
                  <div class="error" id="error-radius"></div>
                </div>

                <div class="field">
                  <label for="maximumStations">Maximale Stationsanzahl</label>
                  <input id="maximumStations" name="maximumStations" type="number" min="1" max="10" step="1" required />
                  <div class="error" id="error-maximumStations"></div>
                </div>

                <div class="field">
                  <label for="startYear">Startjahr</label>
                  <input id="startYear" name="startYear" type="number" min="1800" step="1" required />
                  <div class="error" id="error-startYear"></div>
                </div>

                <div class="field">
                  <label for="endYear">Endjahr (bis 2025)</label>
                  <input id="endYear" name="endYear" type="number" min="1800" max="2025" step="1" required />
                  <div class="error" id="error-endYear"></div>
                </div>
              </div>

              <div class="actions">
                <button class="primary" type="submit" id="searchButton">Suchen</button>
                <button class="secondary" type="button" id="resetButton">Zurücksetzen</button>
                <span class="loading" id="loadingText"></span>
              </div>
            </form>
          </section>

          <section class="card stations-card">
            <h2>Stationsliste</h2>
            <p class="status" id="stationStatus">Noch keine Suche.</p>
            <div class="station-list-scroll">
              <ul class="station-list" id="stationList"></ul>
            </div>
          </section>
        </div>

        <div class="main-row">
          <section class="card result-card">
            <h2>Ergebnis</h2>
            <p class="status" id="resultStatus">Bitte Station auswählen.</p>
            <p class="status" id="dataCoverageHint"></p>
            <div class="chart" id="chartContainer">
              <div class="chart-placeholder">Diagramm</div>
            </div>
            <div class="legend">Legende: TMIN, TMAX</div>
          </section>

          <section class="card temp-card">
            <div class="card-header">
              <h2>Temperaturdaten</h2>
              <label class="view-mode" for="viewMode">
                <span>Anzeige</span>
                <select id="viewMode">
                  <option value="annual">Jahr</option>
                  <option value="spring">Frühling</option>
                  <option value="summer">Sommer</option>
                  <option value="autumn">Herbst</option>
                  <option value="winter">Winter</option>
                </select>
              </label>
            </div>

            <div class="temp-table">
              <div class="temp-head">
                <div class="th">Jahr</div>
                <div class="th">Tmin</div>
                <div class="th">Tmax</div>
              </div>

              <div class="temp-body" id="tempBody"></div>
              <p class="temp-empty" id="tempEmpty">Keine Jahreswerte geladen.</p>
            </div>
          </section>
        </div>
      </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
    <script src="app.js?v=20260303c"></script>
  </body>
</html>
